<text x="728.14" y="406" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="30px" font-family="Georgia, &quot;Times New Roman&quot;, serif">Transformed iframe</text>
<text x="728.14" y="452" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">The right frame is rotated slightly so iframe descendants</text>
<text x="728.14" y="478.34" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">have to inherit the iframe viewport transform instead of</text>
<text x="728.14" y="504.69" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">using plain viewport-relative coordinates.</text>
