<text x="87" y="79" fill="rgb(184, 92, 56)" dominant-baseline="text-before-edge" font-weight="700" font-size="13px" font-family="Georgia, &quot;Times New Roman&quot;, serif" letter-spacing="1.04px">IFRAME WALKING</text>
<text x="75" y="111.5" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="52px" font-family="Georgia, &quot;Times New Roman&quot;, serif" letter-spacing="-1.56px">Embedded documents can now join the</text>
<text x="75" y="163.5" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="52px" font-family="Georgia, &quot;Times New Roman&quot;, serif" letter-spacing="-1.56px">export.</text>
<text x="75" y="232.5" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">This demo mixes a same-origin iframe that loads another demo file with a rotated</text>
<text x="75" y="264" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">iframe rendered from srcdoc content. Enable</text>
<text x="632.69" y="264" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">to traverse those</text>
<text x="75" y="295.5" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">nested documents and keep them in the same paint-order pipeline.</text>
<text x="496.39" y="264" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">walkIframes</text>
<g filter="url(#ds3)"><g><rect x="42" y="380" width="633" height="582" rx="28" ry="28" fill="rgba(255, 255, 255, 0.88)"/><rect x="42" y="380" width="633" height="582" rx="28" ry="28" fill="none" stroke="rgba(22, 33, 62, 0.14)" stroke-width="1"/></g></g>
<text x="67" y="406" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="30px" font-family="Georgia, &quot;Times New Roman&quot;, serif">Embedded existing demo</text>
<text x="67" y="452" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">The left frame points at</text>
<text x="326.67" y="452" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">, so this page exercises same-origin iframe</text>
<text x="67" y="478.34" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">walking across a nested file load instead of only inline markup.</text>
<text x="246.42" y="452" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="17px" font-family="Georgia, &quot;Times New Roman&quot;, serif">text.html</text>
