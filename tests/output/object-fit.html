<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo: Object Fit</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #eef2f7; }
    #root { padding: 24px; }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 18px; color: #475569; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 16px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }
    .frame {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(15, 23, 42, 0.12);
      background: repeating-linear-gradient(45deg, #dbe4f0, #dbe4f0 10px, #f8fafc 10px, #f8fafc 20px);
    }
    img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .label { margin-top: 10px; font-size: 14px; font-weight: bold; }
    .note { font-size: 12px; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="root">
    <h1>Object Fit</h1>
    <p>The same wide image is rendered with contain, cover, and scale-down inside fixed portrait frames.</p>

    <div class="grid">
      <div class="card">
        <div class="frame">
          <img src="./scanner.png" alt="Scanner contain" style="object-fit: contain; object-position: center;">
        </div>
        <div class="label">Contain</div>
        <div class="note">Preserves the full image with letterboxing.</div>
      </div>

      <div class="card">
        <div class="frame">
          <img src="./scanner.png" alt="Scanner cover" style="object-fit: cover; object-position: center;">
        </div>
        <div class="label">Cover</div>
        <div class="note">Fills the frame by cropping the source edges.</div>
      </div>

      <div class="card">
        <div class="frame">
          <img src="./data.png" alt="Small graphic scale-down" style="object-fit: scale-down; object-position: center;">
        </div>
        <div class="label">Scale Down</div>
        <div class="note">Does not upscale when the intrinsic image is already smaller.</div>
      </div>
    </div>
  </div>
</body>
</html>
