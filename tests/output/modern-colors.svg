<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="334" viewBox="0 0 1280 334">
<defs>
<filter id="ds1" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.08)" result="s0"/></filter>
<filter id="ds2" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.08)" result="s0"/></filter>
<filter id="ds3" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.08)" result="s0"/></filter>
<filter id="ds4" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.08)" result="s0"/></filter>
<filter id="ds5" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.08)" result="s0"/></filter>
</defs>
<text x="24" y="25.5" fill="rgb(31, 41, 55)" dominant-baseline="text-before-edge" font-weight="700" font-size="22px" font-family="Arial">Modern CSS Color Functions</text>
<text x="24" y="62.5" fill="rgb(31, 41, 55)" dominant-baseline="text-before-edge" font-size="16px" font-family="Arial">These tiles exercise color(), lab(), lch(), oklab(), and oklch() across fills, borders, and text.</text>
<rect x="24" y="100" width="234" height="120" rx="16" ry="16" fill="color(srgb 1 0.32 0.24 / 0.95)" stroke="color(srgb 0.15 0.15 0.15 / 0.2)" stroke-width="3" filter="url(#ds1)"/>
<text x="41" y="118" fill="color(srgb 1 1 1)" dominant-baseline="text-before-edge" font-weight="700" font-size="12px" font-family="Arial">COLOR(SRGB)</text>
<text x="41" y="187" fill="color(srgb 1 1 1)" dominant-baseline="text-before-edge" font-weight="700" font-size="15px" font-family="Arial">Accent surface</text>
<rect x="274" y="100" width="234" height="120" rx="16" ry="16" fill="lab(54.2917 80.8125 69.8851)" stroke="color(srgb 0.15 0.15 0.15 / 0.2)" stroke-width="3" filter="url(#ds2)"/>
<text x="291" y="118" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="12px" font-family="Arial">LAB()</text>
<text x="291" y="187" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="15px" font-family="Arial">Perceptual red</text>
<rect x="523" y="100" width="234" height="120" rx="16" ry="16" fill="lch(54.2917 106.839 40.853)" stroke="color(srgb 0.15 0.15 0.15 / 0.2)" stroke-width="3" filter="url(#ds3)"/>
<text x="540" y="118" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="12px" font-family="Arial">LCH()</text>
<text x="540" y="187" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="15px" font-family="Arial">Polar lightness</text>
<rect x="773" y="100" width="234" height="120" rx="16" ry="16" fill="oklab(0.62796 0.22486 0.12585)" stroke="color(srgb 0.15 0.15 0.15 / 0.2)" stroke-width="3" filter="url(#ds4)"/>
<text x="790" y="118" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="12px" font-family="Arial">OKLAB()</text>
<text x="790" y="187" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="15px" font-family="Arial">OKLab card</text>
<rect x="1022" y="100" width="234" height="120" rx="16" ry="16" fill="oklch(0.62796 0.25768 29.234)" stroke="color(srgb 0.15 0.15 0.15 / 0.2)" stroke-width="3" filter="url(#ds5)"/>
<text x="1039" y="118" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="12px" font-family="Arial">OKLCH()</text>
<text x="1039" y="187" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="15px" font-family="Arial">OKLCH card</text>
<rect x="24" y="240" width="120" height="70" rx="35" ry="35" fill="color(srgb 0.18 0.66 0.35)"/>
<text x="60.33" y="270.5" fill="rgb(255, 255, 255)" dominant-baseline="text-before-edge" font-weight="700" font-size="13px" font-family="Arial">success</text>
<rect x="158" y="240" width="120" height="70" rx="35" ry="35" fill="lab(70 -10 60)"/>
<text x="203.02" y="270.5" fill="rgb(16, 16, 16)" dominant-baseline="text-before-edge" font-weight="700" font-size="13px" font-family="Arial">warm</text>
<rect x="292" y="240" width="120" height="70" rx="35" ry="35" fill="oklch(0.82 0.12 120)"/>
<text x="340.27" y="270.5" fill="rgb(16, 32, 20)" dominant-baseline="text-before-edge" font-weight="700" font-size="13px" font-family="Arial">mint</text>
</svg>