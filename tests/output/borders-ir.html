<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; }
  .ir-container { position: relative; width: 1240px; height: 315px; overflow: hidden; }
</style>
</head>
<body>
<div class="ir-container">
<div style="position:absolute;left:0px;top:0px;width:1240px;height:315px"></div>
<div style="position:absolute;left:0px;top:0px;width:1240px;height:21px"></div>
<span style="position:absolute;left:0px;top:0px;font-size:18px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1;font-weight:700">Borders &amp; Border Radius</span>
<div style="position:absolute;left:10px;top:104px;width:200px;height:80px;background-color:rgb(255, 224, 178);border:3px solid rgb(51, 51, 51)"></div>
<span style="position:absolute;left:23px;top:117px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Solid border</span>
<div style="position:absolute;left:234px;top:105px;width:200px;height:80px;background-color:rgb(187, 222, 251);border:2px solid rgb(21, 101, 192)"></div>
<span style="position:absolute;left:246px;top:117px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Dashed border</span>
<div style="position:absolute;left:459px;top:105px;width:200px;height:80px;background-color:rgb(255, 205, 210);border:2px solid rgb(198, 40, 40)"></div>
<span style="position:absolute;left:471px;top:117px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Dotted border</span>
<div style="position:absolute;left:683px;top:103px;width:200px;height:80px;background-color:rgb(232, 245, 233);border:4px solid rgb(255, 0, 0) rgb(0, 128, 0) rgb(0, 0, 255) rgb(255, 165, 0)"></div>
<span style="position:absolute;left:694px;top:117px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Mixed borders</span>
<div style="position:absolute;left:908px;top:105px;width:200px;height:80px;background-color:rgb(225, 190, 231);border:2px solid rgb(106, 27, 154);border-radius:15px"></div>
<span style="position:absolute;left:920px;top:117px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Rounded corners</span>
<div style="position:absolute;left:1132px;top:41px;width:80px;height:80px;background-color:rgb(239, 83, 80);border-radius:50%"></div>
<div style="position:absolute;left:10px;top:242px;width:200px;height:40px;background-color:rgb(38, 166, 154);border-radius:20px"></div>
<span style="position:absolute;left:78px;top:254px;font-size:14px;font-family:Arial;color:rgb(255, 255, 255);white-space:nowrap;line-height:1">Pill Shape</span>
<div style="position:absolute;left:234px;top:205px;width:150px;height:100px;background-color:rgb(255, 248, 225);border:10px solid rgb(255, 111, 0)"></div>
<span style="position:absolute;left:264.45px;top:235px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Thick border</span>
<span style="position:absolute;left:264.45px;top:253px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">+ padding</span>
</div>
</body>
</html>
