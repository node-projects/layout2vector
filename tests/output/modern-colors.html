<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo: Modern CSS Colors</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #1f2937; }
    #root { padding: 24px; }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 18px; line-height: 1.4; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .card {
      min-height: 120px;
      padding: 14px;
      border-radius: 16px;
      border: 3px solid color(srgb 0.15 0.15 0.15 / 0.2);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .label { font-size: 12px; font-weight: bold; letter-spacing: 0.04em; text-transform: uppercase; }
    .value { font-size: 15px; font-weight: bold; }
    .srgb { background: color(srgb 1 0.32 0.24 / 0.95); color: color(srgb 1 1 1); }
    .lab { background: lab(54.2917% 80.8125 69.8851); color: white; }
    .lch { background: lch(54.2917% 106.839 40.853); color: white; }
    .oklab { background: oklab(0.62796 0.22486 0.12585); color: white; }
    .oklch { background: oklch(0.62796 0.25768 29.234); color: white; }
    .swatch-row { display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap; }
    .swatch {
      width: 120px;
      height: 70px;
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="root">
    <h1>Modern CSS Color Functions</h1>
    <p>These tiles exercise color(), lab(), lch(), oklab(), and oklch() across fills, borders, and text.</p>

    <div class="grid">
      <div class="card srgb">
        <div class="label">color(srgb)</div>
        <div class="value">Accent surface</div>
      </div>
      <div class="card lab">
        <div class="label">lab()</div>
        <div class="value">Perceptual red</div>
      </div>
      <div class="card lch">
        <div class="label">lch()</div>
        <div class="value">Polar lightness</div>
      </div>
      <div class="card oklab">
        <div class="label">oklab()</div>
        <div class="value">OKLab card</div>
      </div>
      <div class="card oklch">
        <div class="label">oklch()</div>
        <div class="value">OKLCH card</div>
      </div>
    </div>

    <div class="swatch-row">
      <div class="swatch" style="background: color(srgb 0.18 0.66 0.35); color: white;">success</div>
      <div class="swatch" style="background: lab(70% -10 60); color: #101010;">warm</div>
      <div class="swatch" style="background: oklch(0.82 0.12 120); color: #102014;">mint</div>
    </div>
  </div>
</body>
</html>
