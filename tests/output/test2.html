<style>
    #my {
        position: absolute;
        width: 80px;
        top: 140px;
        left: 80px;
        height: 120px;
        border: 1px solid black;
        display: grid;
        overflow: hidden;
        grid-template:
            ". . . . . ." 1%
            ". . . group group ." 7%
            ". objectPlaceName objectPlaceName objectPlaceName objectPlaceName ." 10%
            ". msgPointName msgPointName msgPointName msgPointName ." 7%
            ". . . . . ." 1%
            ". . . . . ." 1%
            ". . . . dataBlockNumber ." 13%
            ". . . . . ." 5%
            ". symbols symbols symbols symbols ." 15%
            ". . . . . ." 5%
            ". telegrams telegrams telegrams telegrams ." 15%
            ". . . . . ." 5%
            "aisle1 aisle1 aisle1 aisle3 aisle3 aisle3" 15% / 1% 24% 25% 25% 24% 1%;

    img {
        height: 100%;
        width: 100%;
        object-fit: contain;
    }

    svg {
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: visible;
        position: absolute;
        stroke: black;
        stroke-width: 2px;
        fill: none;
    }
