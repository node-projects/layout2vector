<text x="87" y="79" fill="rgb(184, 92, 56)" dominant-baseline="text-before-edge" font-weight="700" font-size="13px" font-family="Georgia">IFRAME WALKING</text>
<text x="75" y="112" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="52px" font-family="Georgia">Embedded documents can now join the</text>
<text x="75" y="164" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="52px" font-family="Georgia">export.</text>
<text x="75" y="233.25" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia">This demo mixes a same-origin iframe that loads another demo file with a rotated</text>
<text x="75" y="264.75" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia">iframe rendered from srcdoc content. Enable</text>
<text x="632.67" y="264.75" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia">to traverse those</text>
<text x="75" y="296.25" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia">nested documents and keep them in the same paint-order pipeline.</text>
<text x="496.37" y="264.75" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="21px" font-family="Georgia">walkIframes</text>
<rect x="42" y="379.5" width="633.15" height="581.7" rx="28" ry="28" fill="none" filter="url(#ds3)"/>
<text x="67" y="406" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="30px" font-family="Georgia">Embedded existing demo</text>
<text x="67" y="452.17" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia">The left frame points at</text>
<text x="326.65" y="452.17" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia">, so this page exercises same-origin iframe</text>
<text x="67" y="478.52" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="17px" font-family="Georgia">walking across a nested file load instead of only inline markup.</text>
<text x="246.43" y="452.17" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="17px" font-family="Georgia">text.html</text>
