<text x="632.67" y="264.75" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">to traverse those</text>
<text x="75" y="296.25" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">nested documents and keep them in the same paint-order pipeline.</text>
<text x="496.37" y="264.75" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="21px" font-family="Georgia, &quot;Times New Roman&quot;, serif">walkIframes</text>
