<text x="87" y="79" fill="rgb(184, 92, 56)" dominant-baseline="text-before-edge" font-weight="700" font-size="13px" font-family="Georgia, &quot;Times New Roman&quot;, serif" letter-spacing="1.04px">IFRAME WALKING</text>
<text x="75" y="112" fill="rgb(22, 33, 62)" dominant-baseline="text-before-edge" font-weight="700" font-size="52px" font-family="Georgia, &quot;Times New Roman&quot;, serif" letter-spacing="-1.56px">Embedded documents can now join the</text>
