<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; }
  .ir-container { position: relative; width: 1240px; height: 315px; overflow: hidden; }

</style>
</head>
<body>
<div class="ir-container">
<span style="position:absolute;left:0px;top:1.5px;font-size:18px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;font-weight:700;white-space:normal">Borders &amp; Border Radius</span>
<div style="position:absolute;left:10px;top:103.5px;width:200px;height:80px;box-sizing:border-box;background-color:rgb(255, 224, 178);border:3px solid rgb(51, 51, 51)"></div>
<span style="position:absolute;left:23px;top:117.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:normal">Solid border</span>
<div style="position:absolute;left:234.45px;top:104.5px;width:200px;height:80px;box-sizing:border-box;background-color:rgb(187, 222, 251);border:2px solid rgb(21, 101, 192)"></div>
<span style="position:absolute;left:246.45px;top:117.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:normal">Dashed border</span>
<div style="position:absolute;left:458.9px;top:104.5px;width:200px;height:80px;box-sizing:border-box;background-color:rgb(255, 205, 210);border:2px solid rgb(198, 40, 40)"></div>
<span style="position:absolute;left:470.9px;top:117.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:normal">Dotted border</span>
<div style="position:absolute;left:683.35px;top:102.5px;width:200px;height:80px;box-sizing:border-box;background-color:rgb(232, 245, 233)"></div>
<span style="position:absolute;left:694.35px;top:117.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:normal">Mixed borders</span>
<div style="position:absolute;left:907.8px;top:104.5px;width:200px;height:80px;box-sizing:border-box;background-color:rgb(225, 190, 231);border:2px solid rgb(106, 27, 154);border-radius:15px"></div>
<span style="position:absolute;left:919.8px;top:117.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:normal">Rounded corners</span>
<div style="position:absolute;left:1132.25px;top:41px;width:80px;height:80px;box-sizing:border-box;background-color:rgb(239, 83, 80);border-radius:50%"></div>
<div style="position:absolute;left:10px;top:242px;width:200px;height:40px;box-sizing:border-box;background-color:rgb(38, 166, 154);border-radius:20px"></div>
<span style="position:absolute;left:78.48px;top:255px;font-size:14px;font-family:Arial, sans-serif;color:rgb(255, 255, 255);line-height:1;white-space:normal">Pill Shape</span>
<div style="position:absolute;left:234.45px;top:204.5px;width:150px;height:100px;box-sizing:border-box;background-color:rgb(255, 248, 225);border:10px solid rgb(255, 111, 0)"></div>
<span style="position:absolute;left:264.45px;top:235.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:nowrap">Thick border</span>
<span style="position:absolute;left:264.45px;top:253.5px;font-size:16px;font-family:Arial, sans-serif;color:rgb(0, 0, 0);line-height:1;white-space:nowrap">+ padding</span>
</div>
</body>
</html>
