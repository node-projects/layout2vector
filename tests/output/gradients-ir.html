<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; }
  .ir-container { position: relative; width: 1240px; height: 457px; overflow: hidden; }

</style>
</head>
<body>
<div class="ir-container">
<span style="position:absolute;left:0px;top:1.5px;font-size:18px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1;font-weight:700">Gradients</span>
<div style="position:absolute;left:10px;top:176.5px;width:250px;height:80px;background-color:rgb(102, 126, 234);background-image:linear-gradient(135deg, rgb(102, 126, 234) 0%, rgb(118, 75, 162) 100%);border-radius:8px"></div>
<span style="position:absolute;left:20px;top:187.5px;font-size:16px;font-family:Arial;color:rgb(255, 255, 255);white-space:nowrap;line-height:1;font-weight:700">Linear gradient</span>
<div style="position:absolute;left:284.45px;top:41px;width:150px;height:150px;background-color:rgb(255, 154, 158);background-image:radial-gradient(circle, rgb(255, 154, 158) 0%, rgb(254, 207, 239) 50%, rgb(253, 252, 251) 100%);border-radius:50%"></div>
<div style="position:absolute;left:458.9px;top:41px;width:150px;height:150px;background-color:rgb(255, 0, 0);background-image:conic-gradient(rgb(255, 0, 0), rgb(255, 255, 0), rgb(0, 255, 0), rgb(0, 255, 255), rgb(0, 0, 255), rgb(255, 0, 255), rgb(255, 0, 0));border-radius:50%"></div>
<div style="position:absolute;left:633.35px;top:176.5px;width:250px;height:80px;background-color:rgb(96, 109, 188);background-image:repeating-linear-gradient(45deg, rgb(96, 109, 188), rgb(96, 109, 188) 10px, rgb(70, 82, 152) 10px, rgb(70, 82, 152) 20px)"></div>
<span style="position:absolute;left:643.35px;top:187.5px;font-size:16px;font-family:Arial;color:rgb(255, 255, 255);white-space:nowrap;line-height:1">Repeating stripes</span>
<div style="position:absolute;left:907.8px;top:175.5px;width:300px;height:100px;background-color:rgb(232, 232, 232);background-image:linear-gradient(to right, rgba(255, 0, 0, 0.5), rgba(0, 0, 0, 0)), linear-gradient(rgba(0, 0, 255, 0.5), rgba(0, 0, 0, 0)), none;border:1px solid rgb(204, 204, 204)"></div>
<span style="position:absolute;left:918.8px;top:187.5px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Multiple backgrounds</span>
<span style="position:absolute;left:0px;top:307px;font-size:18px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1;font-weight:700">Box Shadows</span>
<div style="position:absolute;left:20px;top:356.5px;width:200px;height:80px;background-color:rgb(255, 255, 255);border-radius:8px;box-shadow:rgba(0, 0, 0, 0.3) 5px 5px 15px 0px, rgba(0, 0, 0, 0.1) -2px -2px 8px 0px"></div>
<span style="position:absolute;left:30px;top:367.5px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Drop shadow</span>
<div style="position:absolute;left:264.45px;top:356.5px;width:200px;height:80px;background-color:rgb(236, 239, 241);border-radius:8px;box-shadow:rgba(0, 0, 0, 0.2) 3px 3px 10px 0px inset, rgba(255, 255, 255, 0.5) -3px -3px 10px 0px inset"></div>
<span style="position:absolute;left:274.45px;top:367.5px;font-size:16px;font-family:Arial;color:rgb(0, 0, 0);white-space:nowrap;line-height:1">Inset shadow</span>
</div>
</body>
</html>
